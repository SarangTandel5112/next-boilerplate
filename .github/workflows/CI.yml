name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 22.x

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Architecture checks
        run: npm run check:architecture

      - name: Unit test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SENTRY_DISABLED: 'true'
